version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      # Following actions aren't versioned
      - dependency-name: "chainguard-dev/actions/*"
      - dependency-name: "knative/actions/*"
